##notification-service
spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group-v2
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.ticketing.common.events.UserCreatedEvent
  datasource:
    url: jdbc:mysql://localhost:3306/notification_app
    username: notification_app
    password: Notif@7891
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  application:
    name: notification-service
server:
  port: 8085
  address: 0.0.0.0
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    prometheus:
      access: unrestricted
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true